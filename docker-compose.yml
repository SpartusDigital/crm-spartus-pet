version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: petshop_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: petshop_crm
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: petshop_redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  evolution-api:
    image: atendai/evolution-api:latest
    container_name: petshop_evolution
    restart: unless-stopped
    ports:
      - '8080:8080'
    environment:
      SERVER_URL: http://localhost:8080
      AUTHENTICATION_API_KEY: your-evolution-api-key
      DATABASE_ENABLED: 'true'
      DATABASE_CONNECTION_URI: postgresql://postgres:postgres@postgres:5432/evolution
      REDIS_ENABLED: 'true'
      REDIS_URI: redis://redis:6379/1
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: petshop_api
    restart: unless-stopped
    ports:
      - '3001:3001'
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/petshop_crm
      REDIS_URL: redis://redis:6379/0
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: petshop_web
    restart: unless-stopped
    ports:
      - '3000:3000'
    env_file: .env
    depends_on:
      - api

volumes:
  postgres_data:
  redis_data:
