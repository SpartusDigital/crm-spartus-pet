<style>
:root {
  color-scheme: light;
  --gold: #c9a96e;
  --gold-dark: #a8884e;
  --gold-light: #e6d4a8;
  --dark: #0a0a0a;
  --darker: #050505;
  --gray-900: #1a1a1a;
  --gray-800: #2a2a2a;
  --gray-700: #404040;
  --gray-500: #6b7280;
  --gray-300: #d4d4d8;
  --gray-100: #f5f5f5;
  --bg: #f4f1ec;
  --card: #ffffff;
  --border: #d4d4d4;
  --border-soft: #e5e5e5;
  --text: #0a0a0a;
  --text-muted: #6b7280;
  --text-light: #9ca3af;
  --primary: #0a0a0a;
  --primary-accent: #1a1a1a;
  --accent: #c9a96e;
  --success: #10b981;
  --danger: #ef4444;
  --warning: #f59e0b;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: var(--bg); color: var(--text); font-size: 14px; line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}
.serif { font-family: 'Playfair Display', Georgia, serif; }

/* ============ LOGIN ============ */
.login-wrap {
  display: flex; align-items: center; justify-content: center;
  min-height: 100vh; padding: 20px;
  background: linear-gradient(135deg, #fafaf9 0%, #f0ebe0 100%);
  position: relative;
}
.login-wrap::before {
  content: ''; position: absolute; inset: 0;
  background-image:
    linear-gradient(rgba(201,169,110,0.05) 1px, transparent 1px),
    linear-gradient(90deg, rgba(201,169,110,0.05) 1px, transparent 1px);
  background-size: 48px 48px;
  mask-image: radial-gradient(ellipse 70% 60% at 50% 50%, black 30%, transparent 80%);
  -webkit-mask-image: radial-gradient(ellipse 70% 60% at 50% 50%, black 30%, transparent 80%);
  pointer-events: none;
}
.login-card {
  background: white; border-radius: 24px; padding: 44px 40px;
  width: 100%; max-width: 440px;
  box-shadow: 0 30px 80px -20px rgba(0,0,0,0.15), 0 8px 25px -8px rgba(0,0,0,0.06);
  border: 1px solid var(--border); position: relative; z-index: 1;
}
.login-logo { width: 120px; height: 120px; margin: 0 auto 22px; border-radius: 24px; background: white; display: flex; align-items: center; justify-content: center; overflow: hidden; }
.login-logo img { width: 100%; height: 100%; object-fit: contain; }
.login-card h1 {
  font-family: 'Playfair Display', serif; font-size: 30px; text-align: center;
  margin-bottom: 6px; font-weight: 800; letter-spacing: -0.5px;
}
.login-card p.sub { text-align: center; color: var(--text-muted); margin-bottom: 28px; font-size: 14px; }
.login-card .form-group { margin-bottom: 16px; }
.login-card label { display: block; font-size: 11px; font-weight: 700; color: var(--text-muted); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1.5px; }
.login-card input { width: 100%; padding: 13px 16px; border: 1.5px solid var(--border); border-radius: 12px; font-size: 15px; font-family: inherit; background: var(--bg); transition: all 0.2s; }
.login-card input:focus { outline: none; border-color: var(--gold); background: white; box-shadow: 0 0 0 4px rgba(201,169,110,0.12); }
.login-card button[type="submit"] { width: 100%; padding: 14px; background: var(--dark); color: white; border: none; border-radius: 999px; font-size: 14px; font-weight: 700; cursor: pointer; margin-top: 10px; transition: all 0.25s; letter-spacing: 0.3px; font-family: inherit; }
.login-card button[type="submit"]:hover:not(:disabled) { background: var(--gold); transform: translateY(-2px); box-shadow: 0 10px 25px rgba(201,169,110,0.35); }
.login-card button[type="submit"]:disabled { opacity: 0.65; cursor: not-allowed; transform: none; }
.login-card .err { background: #fef2f2; color: #991b1b; padding: 11px 14px; border-radius: 10px; font-size: 13px; margin-bottom: 14px; text-align: center; border: 1px solid #fecaca; }
.login-card .info { background: rgba(201,169,110,0.1); color: var(--gold-dark); padding: 11px 14px; border-radius: 10px; font-size: 12px; margin-bottom: 14px; text-align: center; line-height: 1.55; border: 1px solid rgba(201,169,110,0.2); }

/* ============ APP ============ */
.app { display: flex; min-height: 100vh; }
.sidebar {
  width: 260px; background: var(--dark); color: #cbd5e1; flex-shrink: 0;
  position: sticky; top: 0; height: 100vh; overflow-y: auto;
  display: flex; flex-direction: column;
  border-right: 1px solid #1a1a1a;
}
.sidebar-header { padding: 24px 22px; border-bottom: 1px solid rgba(255,255,255,0.08); }
.sidebar-logo { display: flex; align-items: center; gap: 12px; }
.sidebar-logo-img {
  width: 44px; height: 44px; border-radius: 12px; background: white;
  display: flex; align-items: center; justify-content: center;
  color: var(--dark); font-weight: 700; font-size: 16px; overflow: hidden;
  flex-shrink: 0; padding: 4px;
}
.sidebar-logo-img img { width: 100%; height: 100%; object-fit: contain; }
.sidebar-brand-name { color: white; font-weight: 700; font-size: 16px; font-family: 'Playfair Display', serif; letter-spacing: 0.5px; }

}

function destroyCharts() { chartsRegistry.forEach(c => { try { c.destroy(); } catch(e){} }); chartsRegistry = []; }

// ====== ERROR HELPERS ======
function showAlert(msg) { try { alert(msg); } catch(e) { console.error(msg); } }
function reportErr(op, err) {
  console.error('[' + op + ']', err);
  const m = err && (err.message || err.error_description || err.error || (typeof err === 'string' ? err : JSON.stringify(err)));
  showAlert('Erro em ' + op + ': ' + (m || 'desconhecido'));
}

      const hoje = new Date().toISOString().slice(0,10);
      // Trial vencido: marca como expirado e desativa
      if (p.plano === 'trial' && p.plano_data_expiracao && p.plano_data_expiracao < hoje) {
        trialExpirado = true;
      } else {
        const nomePlano = p.plano === 'trial' ? 'Trial Gratuito' : (p.plano ? p.plano.charAt(0).toUpperCase() + p.plano.slice(1) : 'Plano');
        planoAtivo = { id: p.plano||'', nome: nomePlano, data: p.plano_data_inicio||new Date().toISOString().slice(0,10), expira: p.plano_data_expiracao, isTrial: p.plano === 'trial' };
      }
    }
    return {
      nome: p.empresa_nome||'', telefone: p.empresa_telefone||'', endereco: p.empresa_endereco||'',
      cnpj: p.empresa_cnpj||'', logo: p.empresa_logo_url||'',
      planoAtivo, trialExpirado
    };
  },
  configFromProfile: p => ({
    horarioAbertura: (p.config_horario_abertura||'08:00').slice(0,5),
    horarioFechamento: (p.config_horario_fechamento||'18:00').slice(0,5)
  })
};

// ====== LOAD ALL DATA FROM SUPABASE ======
async function loadAllFromSupabase() {
  const { data: { user } } = await sb.auth.getUser();
  if (!user) return;
  session = { email: user.email, nome: user.user_metadata?.nome || user.email.split('@')[0], userId: user.id };
  auth = { email: user.email, nome: session.nome };

  try {
    const [profileR, tutoresR, petsR, servicosR, agendaR, produtosR, vendasR, finR] = await Promise.all([
      sb.from('profiles').select('*').eq('id', user.id).maybeSingle(),
      sb.from('tutores').select('*').order('created_at', { ascending: true }),
      sb.from('pets').select('*').order('created_at', { ascending: true }),
      sb.from('servicos').select('*').order('created_at', { ascending: true }),
      sb.from('agendamentos').select('*').order('data', { ascending: true }),
      sb.from('produtos').select('*').order('created_at', { ascending: true }),
      sb.from('vendas').select('*').order('data', { ascending: false }),
      sb.from('financeiro').select('*').order('data', { ascending: false })
    ]);

    if (profileR.error) console.warn('profile err', profileR.error);
    const p = profileR.data || {};
    if (p) {
      auth.nome = p.nome || auth.nome;
      session.nome = auth.nome;
    }
    // Auto-inicia trial de 3 dias para novos usuários sem plano cadastrado
    if (!p.plano_ativo && !p.plano) {
      const expira = new Date();
      expira.setDate(expira.getDate() + 3);
      const trialData = {
        plano: 'trial', plano_ativo: true,
        plano_data_inicio: new Date().toISOString().slice(0, 10),
        plano_data_expiracao: expira.toISOString().slice(0, 10)
      };
      const { error: trialErr } = await sb.from('profiles').update(trialData).eq('id', user.id);
      if (!trialErr) Object.assign(p, trialData);
    }
    state.empresa = Mappers.empresaFromProfile(p);
    state.config = Mappers.configFromProfile(p);
    state.tutores = (tutoresR.data || []).map(Mappers.tutorFromDb);
    state.pets = (petsR.data || []).map(Mappers.petFromDb);
    state.servicos = (servicosR.data || []).map(Mappers.servicoFromDb);
    state.agendamentos = (agendaR.data || []).map(Mappers.agendaFromDb);
    state.produtos = (produtosR.data || []).map(Mappers.produtoFromDb);
    state.vendas = (vendasR.data || []).map(Mappers.vendaFromDb);
    state.financeiro = (finR.data || []).map(Mappers.finFromDb);
  } catch (err) {
    reportErr('carregar dados', err);
  }
}

async function reloadProfile() {
  const { data: { user } } = await sb.auth.getUser();
  if (!user) return;

}

// ====== HELPERS ======
function getTutor(id) { return state.tutores.find(t => t.id === id); }
function getPet(id) { return state.pets.find(p => p.id === id); }
function getPetsByTutor(tid) { return state.pets.filter(p => p.tutorId === tid); }
function getServico(id) { return state.servicos.find(s => s.id === id); }
function precoPorPorte(s, porte) { if (!s) return 0; return ({Pequeno:s.precoPequeno,Médio:s.precoMedio,Grande:s.precoGrande}[porte]) || s.precoMedio || 0; }
function diasDesdeUltimoBanho(p) { return p.ultimoBanho ? daysBetween(p.ultimoBanho, todayStr()) : null; }
function proximoRetornoEstimado(p) { if (!p.ultimoBanho || !p.recorrenciaDias) return null; const d = new Date(p.ultimoBanho+'T00:00:00'); d.setDate(d.getDate()+(p.recorrenciaDias||21)); return d.toISOString().slice(0,10); }
function receitaDoMes(ano, mes) { let t = 0; state.agendamentos.forEach(a => { if (a.status==='realizado') { const d = new Date(a.data+'T00:00:00'); if (d.getFullYear()===ano && d.getMonth()===mes) t += (a.valor||0); } }); const vendaRefs=new Set(state.financeiro.map(f=>{const m=(f.descricao||'').match(/^\[ref:([^\]]+)\]/);return m?m[1]:null;}).filter(Boolean)); state.vendas.forEach(v => { if (!vendaRefs.has(v.id)) { const d = new Date(v.data+'T00:00:00'); if (d.getFullYear()===ano && d.getMonth()===mes) t += (v.total||0); } }); state.financeiro.forEach(f => { if (f.tipo==='receita') { const d = new Date(f.data+'T00:00:00'); if (d.getFullYear()===ano && d.getMonth()===mes) t += (f.valor||0); } }); return t; }
function despesasDoMes(ano, mes) { return state.financeiro.filter(f => { if (f.tipo!=='despesa') return false; const d = new Date(f.data+'T00:00:00'); return d.getFullYear()===ano && d.getMonth()===mes; }).reduce((s,f) => s+(f.valor||0), 0); }

function getInitials(name) { return (name||'PS').split(' ').slice(0,2).map(w => w[0]||'').join('').toUpperCase(); }

function traduzirErroAuth(msg) {
  var m = (msg || '').toLowerCase();
  if (/error sending confirmation|unexpected_failure/i.test(m)) {
    return { tipo: 'outro', texto: 'Falha ao enviar e-mail de confirmação. Tente novamente em alguns minutos ou entre em contato: comercial@spartusdigital.com' };
  }
  if (/security purposes|only request this after|rate.?limit|too many request/i.test(m)) {
    var seg = (msg.match(/after (\d+) second/i) || [])[1];
    return { tipo: 'rateLimit', segundos: parseInt(seg || '60', 10), texto: 'Muitas tentativas em pouco tempo. Aguarde alguns segundos e tente novamente.' };
  }
  if (/already registered|user already exist|already been registered/i.test(m)) return { tipo: 'outro', texto: 'Este e-mail já está cadastrado. Clique em "Entrar" para fazer login.' };
  if (/invalid login credentials|invalid credentials|invalid email or password|wrong password|bad credentials/i.test(m)) return { tipo: 'outro', texto: 'E-mail ou senha incorretos. Verifique e tente novamente.' };
  if (/email not confirmed|email link is invalid or has expired|otp expired/i.test(m)) return { tipo: 'outro', texto: 'E-mail ainda não confirmado. Verifique sua caixa de entrada (e spam) e clique no link que enviamos.' };
  if (/invalid email/i.test(m)) return { tipo: 'outro', texto: 'E-mail inválido. Verifique o endereço digitado.' };
  if (/password should be at least|password.*too short|weak password/i.test(m)) return { tipo: 'outro', texto: 'A senha deve ter pelo menos 6 caracteres.' };
  if (/network|fetch|failed to fetch|connection/i.test(m)) return { tipo: 'outro', texto: 'Erro de conexão. Verifique sua internet e tente novamente.' };
  return { tipo: 'outro', texto: 'Algo deu errado. Tente novamente ou fale com o suporte.' };
}

function iniciarContagemRegressiva(btnId, textoPadrao, segundos) {
  var restando = segundos;
  var btn = document.getElementById(btnId);
  if (btn) btn.textContent = 'Aguarde ' + restando + 's...';
  var intervalo = setInterval(function() {
    restando--;
    var b = document.getElementById(btnId);
    if (!b) { clearInterval(intervalo); return; }
    if (restando <= 0) {
      clearInterval(intervalo);
      b.disabled = false;
      b.textContent = textoPadrao;
    } else {
      b.textContent = 'Aguarde ' + restando + 's...';
    }
  }, 1000);
}

window.doSignup = async function(e) {
  e.preventDefault();
  const f = e.target;
  const btn = document.getElementById('btnSignup');
  const el = document.getElementById('authErr');
  if (btn) { btn.disabled = true; btn.textContent = 'Criando conta...'; }
  if (el) el.innerHTML = '';
  const email = f.email.value.trim().toLowerCase();
  try {
    const { data, error } = await sb.auth.signUp({
      email,
      password: f.senha.value,
      options: {
        data: { nome: f.nome.value.trim() },
        emailRedirectTo: 'https://crm.spartuspet.com.br'
      }
    });
    if (error) throw error;
    if (!data.session) {
      mostrarTelaEmailEnviado(email);
      return false;
    }
    await loadAllFromSupabase();
    if (isAdmin()) currentPage = 'admin';
    render();
  } catch(err) {
    const resultado = traduzirErroAuth(err.message || String(err));
    if (el) el.innerHTML = '<div class="err">' + escapeHtml(resultado.texto) + '</div>';
    if (resultado.tipo === 'rateLimit') {
      iniciarContagemRegressiva('btnSignup', 'Criar conta', resultado.segundos);
    } else {
      if (btn) { btn.disabled = false; btn.textContent = 'Criar conta'; }
    }
  }
  return false;
};

window.doLogin = async function(e) {
  e.preventDefault();
  const f = e.target;
  const btn = document.getElementById('btnLogin');
  const el = document.getElementById('authErr');
  if (btn) { btn.disabled = true; btn.textContent = 'Entrando...'; }
  if (el) el.innerHTML = '';
  try {
    const { data, error } = await sb.auth.signInWithPassword({
      email: f.email.value.trim().toLowerCase(),
      password: f.senha.value
    });
    if (error) throw error;
    await loadAllFromSupabase();
    if (isAdmin()) currentPage = 'admin';
    render();
  } catch(err) {
    const resultado = traduzirErroAuth(err.message || String(err));
    if (el) el.innerHTML = '<div class="err">' + escapeHtml(resultado.texto) + '</div>';
    if (resultado.tipo === 'rateLimit') {
      iniciarContagemRegressiva('btnLogin', 'Entrar', resultado.segundos);
    } else {
      if (btn) { btn.disabled = false; btn.textContent = 'Entrar'; }
    }
  }
  return false;
};

  const lucro = receita - despesas;
  const hoje = todayStr();
  const agendHoje = state.agendamentos.filter(a => a.data === hoje && a.status !== 'cancelado');
  const servMes = state.agendamentos.filter(a => { const d = new Date(a.data+'T00:00:00'); return d.getFullYear()===ano && d.getMonth()===mes && a.status==='realizado'; }).length;
  const ticketMedio = servMes ? receita / servMes : 0;
  const estoqueBaixo = state.produtos.filter(p => p.estoque <= p.estoqueMinimo);
  const retornos = state.pets.map(p => ({pet:p, proximo:proximoRetornoEstimado(p)})).filter(x => x.proximo && x.proximo <= hoje).sort((a,b) => a.proximo.localeCompare(b.proximo));
  const proximos = state.agendamentos.filter(a => a.data >= hoje && a.status !== 'cancelado' && a.status !== 'realizado').sort((a,b) => (a.data+a.horario).localeCompare(b.data+b.horario)).slice(0,6);

      <div class="kpi"><div class="kpi-label">Agendamentos hoje</div><div class="kpi-value">${agendHoje.length}</div></div>
      <div class="kpi"><div class="kpi-label">Clientes</div><div class="kpi-value">${state.tutores.length}</div><div class="kpi-sub">${state.pets.length} pets</div></div>

    <div class="grid-2">

// ====== PAGE: AGENDA ======
let agendaWeekStart = null;
function pageAgenda() {
  if (!agendaWeekStart) { const d = new Date(); const dow = d.getDay(); d.setDate(d.getDate()-dow); agendaWeekStart = d.toISOString().slice(0,10); }
  const start = new Date(agendaWeekStart+'T00:00:00');
  const dias = []; for (let i = 0; i < 7; i++) { const d = new Date(start); d.setDate(d.getDate()+i); dias.push(d); }
  const sh = parseInt((state.config.horarioAbertura||'08:00').split(':')[0]);
  const eh = parseInt((state.config.horarioFechamento||'18:00').split(':')[0]);
  const horarios = []; for (let h = sh; h <= eh; h++) { horarios.push(String(h).padStart(2,'0')+':00'); horarios.push(String(h).padStart(2,'0')+':30'); }
  const hoje = todayStr();

  let grid = '<div class="cal-header"></div>';
  dias.forEach(d => {
    const ds = d.toISOString().slice(0,10);
    grid += `<div class="cal-header ${ds===hoje?'today':''}">${['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'][d.getDay()]}<br><small>${d.getDate()}/${d.getMonth()+1}</small></div>`;
  });
  horarios.forEach(h => {
    grid += `<div class="cal-time">${h}</div>`;
    dias.forEach(d => {
      const ds = d.toISOString().slice(0,10);
      const eventos = state.agendamentos.filter(a => a.data === ds && a.horario === h);
      grid += `<div class="cal-slot" onclick="novoAgendamento('${ds}','${h}')">`;
      eventos.forEach(e => {
        const p = getPet(e.petId);
        const catKey = (e.categoria||'outro').toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g, '');
        const cls = e.status === 'cancelado' ? 'cancelado' : e.status === 'realizado' ? 'realizado' : catKey;
        const dur = e.duracao || 60;
        const slots = Math.max(1, Math.ceil(dur / 30));
        const altura = slots * 48 + (slots - 1) - 4; // px (48px por slot + 1px gap)
        const fimMin = (function(){ const [hh,mm] = e.horario.split(':').map(Number); const totMin = hh*60 + mm + dur; const fh = String(Math.floor(totMin/60)).padStart(2,'0'); const fm = String(totMin%60).padStart(2,'0'); return fh+':'+fm; })();
        grid += `<div class="cal-event ${cls}" style="position:absolute;left:2px;right:2px;top:2px;height:${altura}px;z-index:2;overflow:hidden;display:flex;flex-direction:column;justify-content:flex-start" onclick="event.stopPropagation();editarAgendamento('${e.id}')"><div style="font-weight:600">${e.horario} - ${fimMin}</div><div>${escapeHtml(p?.nome||'?')} · ${escapeHtml(e.servicoNome)}</div>${slots>1?`<div style="font-size:10px;opacity:0.85;margin-top:2px">${dur} min</div>`:''}</div>`;
      });
      grid += `</div>`;
    });
  });
  const fim = new Date(start); fim.setDate(fim.getDate()+6);

  return `
    <div class="page-header">
      <div><div class="page-title">Agenda</div><div class="page-sub">${start.toLocaleDateString('pt-BR')} a ${fim.toLocaleDateString('pt-BR')}</div></div>
      <div class="data-actions">
        <button class="btn btn-secondary btn-sm" onclick="mudarSemana(-7)">Semana anterior</button>
        <button class="btn btn-secondary btn-sm" onclick="agendaWeekStart=null;renderPage()">Hoje</button>
        <button class="btn btn-secondary btn-sm" onclick="mudarSemana(7)">Próxima semana</button>
        <button class="btn btn-primary" onclick="novoAgendamento()">Novo agendamento</button>
      </div>
    </div>
    <div class="card">
      <div class="flex-between" style="margin-bottom:14px"><small class="hint">Clique em um horário vazio para agendar. Clique em um evento para editar.</small>
      <small class="hint">Banho (azul) · Tosa (roxo) · Pacote (verde) · Estética (rosa) · Outro (laranja) · Realizado (verde escuro)</small></div>
      <div class="calendar-wrap"><div class="calendar-grid">${grid}</div></div>
    </div>`;
}
window.mudarSemana = d => { const dt = new Date(agendaWeekStart+'T00:00:00'); dt.setDate(dt.getDate()+d); agendaWeekStart = dt.toISOString().slice(0,10); renderPage(); };
window.novoAgendamento = (data, horario) => abrirFormAgendamento(null, data, horario);
window.editarAgendamento = id => abrirFormAgendamento(id);

function abrirFormAgendamento(id, dataDefault, horarioDefault) {
  const a = id ? state.agendamentos.find(x => x.id === id) : null;
  const petOptions = state.pets.map(p => { const t = getTutor(p.tutorId); return `<option value="${p.id}" ${a&&a.petId===p.id?'selected':''}>${escapeHtml(p.nome)} (${escapeHtml(t?.nome||'')}) - ${p.porte}${p.temperamento==='Agressivo'?' [AGRESSIVO]':''}</option>`; }).join('');

  // Pre-selecionados (compatível com agendamentos antigos que tinham apenas servicoNome string)
  let preSelectedIds = [];
  if (a) {
    if (Array.isArray(a.servicos) && a.servicos.length) {
      preSelectedIds = a.servicos.map(x => x.id).filter(Boolean);
    } else if (a.servicoNome) {
      const nomes = a.servicoNome.split(/[,+]/).map(s => s.trim());
      preSelectedIds = state.servicos.filter(s => nomes.includes(s.nome)).map(s => s.id);
    }
  }
  const servCheckboxes = state.servicos.map(s => {
    const checked = preSelectedIds.includes(s.id) ? 'checked' : '';
    return `<label style="display:flex;align-items:center;gap:8px;padding:6px 4px;font-weight:normal;font-size:13px;cursor:pointer;border-bottom:1px solid var(--border-soft)"><input type="checkbox" name="serv" value="${s.id}" ${checked} onchange="atualizarValorAgend(this.form)"><span><strong>${escapeHtml(s.nome)}</strong> <small style="color:var(--text-muted)">${s.categoria} · ${s.duracao} min</small></span></label>`;
  }).join('');

  openModal(`
    <h3>${a?'Editar':'Novo'} agendamento</h3>
    <form onsubmit="salvarAgendamento(event, '${id||''}')">
      <div class="form-grid">
        <div class="form-group full"><label>Pet *</label><select name="petId" required onchange="atualizarValorAgend(this.form)">${petOptions}</select></div>
        <div class="form-group full"><label>Serviços * <small style="font-weight:normal;color:var(--text-muted)">(selecione um ou mais — valor e duração são somados)</small></label>
          <div style="display:grid;grid-template-columns:repeat(auto-fit, minmax(220px, 1fr));gap:0 16px;border:1px solid var(--border);padding:10px 14px;border-radius:6px;background:#fafbfc;max-height:220px;overflow-y:auto">${servCheckboxes}</div>
        </div>
        <div class="form-group"><label>Data</label><input type="date" name="data" value="${a?.data||dataDefault||todayStr()}" required></div>
        <div class="form-group"><label>Horário início</label><input type="time" name="horario" value="${a?.horario||horarioDefault||'09:00'}" required></div>
        <div class="form-group"><label>Duração total (min)</label><input type="number" step="15" min="15" name="duracao" value="${a?.duracao||60}" required></div>
        <div class="form-group"><label>Valor total (R$)</label><input type="number" step="0.01" name="valor" value="${a?.valor||''}" required></div>
        <div class="form-group"><label>Status</label><select name="status"><option value="confirmado" ${a?.status==='confirmado'?'selected':''}>Confirmado</option><option value="realizado" ${a?.status==='realizado'?'selected':''}>Realizado</option><option value="cancelado" ${a?.status==='cancelado'?'selected':''}>Cancelado</option><option value="pendente" ${a?.status==='pendente'?'selected':''}>Pendente</option></select></div>
        <div class="form-group"><label>Profissional</label><input name="profissional" value="${escapeHtml(a?.profissional||'')}"></div>
        <div class="form-group full"><label>Observações</label><textarea name="observacoes">${escapeHtml(a?.observacoes||'')}</textarea></div>
      </div>
      <div class="modal-actions">
        ${a?`<button type="button" class="btn btn-danger" onclick="excluirAgendamento('${a.id}')">Excluir</button>`:''}
        <button type="button" class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
        <button type="submit" class="btn btn-primary">Salvar</button>
      </div>
    </form>
  `);
  setTimeout(() => { const f = document.querySelector('.modal form'); if (f && !a) atualizarValorAgend(f); }, 100);
}

window.atualizarValorAgend = function(form) {
  const pet = getPet(form.petId.value);
  const checks = form.querySelectorAll('input[name="serv"]:checked');
  let total = 0, dur = 0;
  checks.forEach(cb => {
    const s = getServico(cb.value);
    if (!s) return;
    total += precoPorPorte(s, pet?.porte || 'Médio');
    dur += s.duracao || 30;
  });
  if (form.valor && total) form.valor.value = total.toFixed(2);
  if (form.duracao && dur) form.duracao.value = dur;
};

window.salvarAgendamento = async function(e, id) {
  e.preventDefault();
  const f = e.target;
  const pet = getPet(f.petId.value);
  const checks = f.querySelectorAll('input[name="serv"]:checked');
  if (!checks.length) { showAlert('Selecione ao menos um serviço.'); return; }
  const servicos = [];
  checks.forEach(cb => {
    const s = getServico(cb.value);
    if (!s) return;
    servicos.push({ id: s.id, nome: s.nome, categoria: s.categoria, valor: precoPorPorte(s, pet?.porte||'Médio'), duracao: s.duracao||30 });
  });
  const servicoNome = servicos.map(x => x.nome).join(' + ');
  const cats = servicos.map(s => s.categoria);
  const categoria = servicos.length > 1 ? 'Pacote' : (servicos[0]?.categoria || 'Outro');
  const data = { petId: f.petId.value, servicos, servicoNome, categoria, data: f.data.value, horario: f.horario.value, duracao: parseInt(f.duracao.value)||60, status: f.status.value, valor: parseFloat(f.valor.value)||0, observacoes: f.observacoes.value, profissional: f.profissional.value };

    if (id) {

      if (error) throw error;
      const idx = state.agendamentos.findIndex(x => x.id === id);
      if (idx >= 0) state.agendamentos[idx] = Mappers.agendaFromDb(row);

      if (error) throw error;
      state.agendamentos.push(Mappers.agendaFromDb(row));
    }
    if (data.status === 'realizado' && pet) {
      const updates = {};
      if (cats.includes('Banho') || cats.includes('Pacote')) updates.ultimo_banho = data.data;
      if (cats.includes('Tosa') || cats.includes('Pacote')) updates.ultima_tosa = data.data;
      if (Object.keys(updates).length) {
        const { data: pRow, error: pErr } = await sb.from('pets').update(updates).eq('id', pet.id).select().single();
        if (!pErr && pRow) {
          const pi = state.pets.findIndex(x => x.id === pet.id);
          if (pi >= 0) state.pets[pi] = Mappers.petFromDb(pRow);
        }
      }
    }
    closeModal(); renderPage();
  } catch(err) { reportErr('salvar agendamento', err); }
};

window.salvarProduto = async function(e, id) {
  e.preventDefault();
  const f = e.target;
  const data = { codigo: f.codigo.value, nome: f.nome.value, categoria: f.categoria.value, estoque: parseInt(f.estoque.value)||0, estoqueMinimo: parseInt(f.estoqueMinimo.value)||0, precoCusto: parseFloat(f.precoCusto.value)||0, precoVenda: parseFloat(f.precoVenda.value)||0 };
  try {
    if (id) {
      const { data: row, error } = await sb.from('produtos').update(Mappers.produtoToDb(data)).eq('id', id).select().single();
      if (error) throw error;
      const idx = state.produtos.findIndex(x => x.id === id);
      if (idx >= 0) state.produtos[idx] = Mappers.produtoFromDb(row);
    } else {
      const u = (await sb.auth.getUser()).data.user;
      const payload = { ...Mappers.produtoToDb(data), user_id: u.id };
      const { data: row, error } = await sb.from('produtos').insert(payload).select().single();
      if (error) throw error;
      state.produtos.push(Mappers.produtoFromDb(row));
    }
    closeModal(); renderPage();
  } catch(err) { reportErr('salvar produto', err); }
};
window.excluirProduto = async function(id) {
  if (!confirm('Excluir este produto?')) return;
  try {
    const { error } = await sb.from('produtos').delete().eq('id', id);
    if (error) throw error;
    state.produtos = state.produtos.filter(p => p.id !== id);
    closeModal(); renderPage();
  } catch(err) { reportErr('excluir produto', err); }
};

let pdvCart = [], pdvCliente = '', pdvPagamento = 'Dinheiro', pdvTipoItem = 'produto';

// ====== AUTO-COMPLETE AGENDAMENTOS ======
let _autoCompleteInterval = null;
async function checkAutoComplete() {
  const now = new Date();
  const toComplete = state.agendamentos.filter(a => {
    if (a.status !== 'confirmado') return false;
    if (!a.data || !a.horario || !a.valor) return false;
    const [hh,mm] = a.horario.split(':').map(Number);
    const endDt = new Date(a.data+'T00:00:00');
    endDt.setHours(hh, mm+(a.duracao||60)+5, 0, 0);
    return now >= endDt;
  });
  for (const a of toComplete) {
    try {
      const {data:row,error} = await sb.from('agendamentos').update({status:'realizado'}).eq('id',a.id).select().single();
      if (!error) { const idx=state.agendamentos.findIndex(x=>x.id===a.id); if(idx>=0) state.agendamentos[idx]=Mappers.agendaFromDb(row); }
    } catch(e) { console.warn('auto-complete:',e); }
  }
  if (toComplete.length) renderPage();
}
function startAutoComplete() {
  if (_autoCompleteInterval) clearInterval(_autoCompleteInterval);
  checkAutoComplete();
  _autoCompleteInterval = setInterval(checkAutoComplete, 60000);
}
function pageVendas() {

  const clienteOptions = ['<option value="">— Cliente avulso —</option>', ...state.tutores.map(t => `<option value="${t.id}" ${pdvCliente===t.id?'selected':''}>${escapeHtml(t.nome)}</option>`)].join('');

  return `

        <div class="pdv-items" id="pdvList">

        </div>
      </div>
      <div class="card">
        <h3>Carrinho</h3>
        <div class="form-group"><label>Cliente</label><select onchange="pdvCliente=this.value">${clienteOptions}</select></div>
        <div style="margin:14px 0;min-height:100px">
          ${pdvCart.length ? pdvCart.map((i,idx) => `<div class="cart-item" style="flex-direction:column;gap:6px"><div style="display:flex;justify-content:space-between"><strong style="font-size:13px">${escapeHtml(i.nome)}</strong><a href="#" onclick="removerPdv(${idx});return false" style="color:var(--danger);font-size:11px">remover</a></div><div style="display:flex;gap:5px;align-items:center;flex-wrap:wrap;font-size:12px"><span style="color:var(--text-muted)">Qtd</span><input type="number" min="1" value="${i.qtd}" style="width:44px;padding:2px 4px;border:1px solid var(--border);border-radius:4px;font-size:12px" onchange="atualizarQtdPdv(${idx},this.value)"><span style="color:var(--text-muted)">Preço R$</span><input type="number" min="0" step="0.01" value="${(i.valorCustom!==undefined?i.valorCustom:(i.valorOriginal||i.valor)).toFixed(2)}" style="width:70px;padding:2px 4px;border:1px solid var(--border);border-radius:4px;font-size:12px" onchange="atualizarPrecoPdv(${idx},this.value)"><span style="color:var(--text-muted)">Desc%</span><input type="number" min="0" max="100" value="${i.desconto||0}" style="width:44px;padding:2px 4px;border:1px solid var(--border);border-radius:4px;font-size:12px" onchange="atualizarDescontoPdv(${idx},this.value)"></div><div style="text-align:right">${i.desconto>0?'<small style="color:var(--text-muted);text-decoration:line-through">'+fmtBRL((i.valorOriginal||i.valor)*i.qtd)+'</small> ':''}  <strong style="color:var(--success)">${fmtBRL(i.valor*i.qtd)}</strong></div></div>`).join('') : '<div class="empty-state" style="padding:20px">Carrinho vazio</div>'}

    </div>`;
}
window.filtrarPdv = q => { document.querySelectorAll('#pdvList .pdv-item').forEach(el => { el.style.display = el.textContent.toLowerCase().includes(q.toLowerCase()) ? '' : 'none'; }); };
window.adicionarPdv = (id, tipo, nome, valor) => { const ex = pdvCart.find(i => i.id === id); if (ex) ex.qtd++; else pdvCart.push({id, tipo, nome, valor, valorOriginal:valor, desconto:0, qtd:1}); renderPage(); };
window.atualizarQtdPdv = (idx, v) => { pdvCart[idx].qtd = Math.max(1, parseInt(v)||1); renderPage(); };
window.atualizarPrecoPdv = (idx, v) => { const val=Math.max(0,parseFloat(v)||0); pdvCart[idx].valor=val; pdvCart[idx].valorCustom=val; pdvCart[idx].desconto=0; renderPage(); };
window.atualizarDescontoPdv = (idx, pct) => { const p=Math.min(100,Math.max(0,parseFloat(pct)||0)); pdvCart[idx].desconto=p; pdvCart[idx].valor=(pdvCart[idx].valorOriginal||pdvCart[idx].valor)*(1-p/100); pdvCart[idx].valorCustom=pdvCart[idx].valor; renderPage(); };
window.removerPdv = idx => { pdvCart.splice(idx, 1); renderPage(); };
window.limparPdv = () => { pdvCart = []; pdvCliente = ''; renderPage(); };
window.finalizarPdv = async function() {
  if (!pdvCart.length) return;
  const total = pdvCart.reduce((s,i) => s+i.valor*i.qtd, 0);
  const cliente = pdvCliente ? getTutor(pdvCliente) : null;
  try {
    const u = (await sb.auth.getUser()).data.user;
    // 1) Insert venda
    const vendaPayload = { ...Mappers.vendaToDb({ clienteId: pdvCliente||null, clienteNome: cliente?.nome||null, itens: pdvCart, total, pagamento: pdvPagamento, data: todayStr() }), user_id: u.id };
    const { data: vRow, error: vErr } = await sb.from('vendas').insert(vendaPayload).select().single();
    if (vErr) throw vErr;
    state.vendas.unshift(Mappers.vendaFromDb(vRow));
    // 2) Atualiza estoque dos produtos vendidos (sequencial pra simplicidade)
    for (const i of pdvCart) {
      if (i.tipo === 'produto') {
        const prod = state.produtos.find(p => p.id === i.id);
        if (prod) {
          const novoEstoque = Math.max(0, prod.estoque - i.qtd);
          const { data: pRow, error: pErr } = await sb.from('produtos').update({ estoque: novoEstoque }).eq('id', i.id).select().single();
          if (pErr) console.warn('estoque update', pErr);
          else prod.estoque = pRow.estoque;
        }
      }
    }
    // 3) Registra receita no financeiro
    const itensDesc = pdvCart.map(i => i.nome).join(', ');
    const finPayload = { tipo:'receita', categoria:'Venda PDV', valor:total, data:todayStr(), descricao:'[ref:'+vRow.id+'] PDV'+(cliente?' - '+cliente.nome:'')+': '+itensDesc.slice(0,150), user_id:u.id };
    const {data:finRow,error:finErr} = await sb.from('financeiro').insert(finPayload).select().single();
    if (finErr) console.warn('financeiro insert:',finErr);
    else state.financeiro.unshift(Mappers.finFromDb(finRow));
    showAlert(`Venda finalizada! Total: ${fmtBRL(total)}`);
    pdvCart = []; pdvCliente = ''; renderPage();
  } catch(err) { reportErr('finalizar venda', err); }
};

let finFilter = 'todos', finDateFrom = '', finDateTo = '';
function pageFinanceiro() {
  const now = new Date(), ano = now.getFullYear(), mes = now.getMonth();
  const hasDateFilter = finDateFrom || finDateTo;

  // Build full ledger
  let lanc = [];
  state.agendamentos.forEach(a => { if (a.status === 'realizado') { const p = getPet(a.petId); const t = p?getTutor(p.tutorId):null; lanc.push({ id: 'a_'+a.id, tipo: 'receita', data: a.data, descricao: a.servicoNome+' - '+(p?.nome||'?')+' ('+(t?.nome||'')+')', categoria: 'Serviço', valor: a.valor||0, source: 'agend', createdAt: a.createdAt }); } });
  const vendaRefs=new Set(state.financeiro.map(f=>{const m=(f.descricao||'').match(/^\[ref:([^\]]+)\]/);return m?m[1]:null;}).filter(Boolean));
  state.vendas.forEach(v => { if (!vendaRefs.has(v.id)) lanc.push({ id: 'v_'+v.id, tipo: 'receita', data: v.data, descricao: 'Venda '+(v.clienteNome||'avulsa'), categoria: 'Venda', valor: v.total||0, source: 'venda', createdAt: v.createdAt }); });
  state.financeiro.forEach(f => lanc.push({ ...f, source: 'fin' }));
  lanc.sort((a,b) => { const d=(b.data||'').localeCompare(a.data||''); return d!==0?d:(b.createdAt||'').localeCompare(a.createdAt||''); });

  // KPI base: date range if set, otherwise current month
  let kpiLanc = hasDateFilter
    ? lanc.filter(l => { if (!l.data) return false; if (finDateFrom && l.data < finDateFrom) return false; if (finDateTo && l.data > finDateTo) return false; return true; })
    : lanc.filter(l => { if (!l.data) return false; const d = new Date(l.data+'T00:00:00'); return d.getFullYear()===ano && d.getMonth()===mes; });

  const receita = kpiLanc.filter(l => l.tipo==='receita').reduce((s,l) => s+(l.valor||0), 0);
  const despesas = kpiLanc.filter(l => l.tipo==='despesa').reduce((s,l) => s+(l.valor||0), 0);
  const lucro = receita - despesas;
  const kpiSuffix = hasDateFilter ? 'do período' : 'do mês';

  // Table: apply date range then type filter
  if (finDateFrom) lanc = lanc.filter(l => l.data && l.data >= finDateFrom);
  if (finDateTo) lanc = lanc.filter(l => l.data && l.data <= finDateTo);
  if (finFilter === 'receitas') lanc = lanc.filter(l => l.tipo === 'receita');
  if (finFilter === 'despesas') lanc = lanc.filter(l => l.tipo === 'despesa');

  return `
    <div class="page-header"><div><div class="page-title">Financeiro</div><div class="page-sub">Controle de receitas e despesas</div></div>
      <div class="data-actions">
        <button class="btn btn-success" onclick="novoLancamento('receita')">+ Receita</button>
        <button class="btn btn-danger" onclick="novoLancamento('despesa')">+ Despesa</button>
      </div>
    </div>
    <div class="kpi-grid">
      <div class="kpi"><div class="kpi-label">Receita ${kpiSuffix}</div><div class="kpi-value success">${fmtBRL(receita)}</div></div>
      <div class="kpi"><div class="kpi-label">Despesas ${kpiSuffix}</div><div class="kpi-value danger">${fmtBRL(despesas)}</div></div>
      <div class="kpi"><div class="kpi-label">Lucro ${kpiSuffix}</div><div class="kpi-value ${lucro>=0?'success':'danger'}">${fmtBRL(lucro)}</div></div>
      <div class="kpi"><div class="kpi-label">Margem</div><div class="kpi-value">${receita>0?((lucro/receita)*100).toFixed(1):0}%</div></div>
    </div>
    <div style="display:flex;align-items:center;gap:10px;margin:14px 0 6px;flex-wrap:wrap">
      <span style="font-size:13px;font-weight:500;color:var(--text-muted)">Período:</span>
      <span style="font-size:13px;color:var(--text-muted)">De</span>
      <input type="date" value="${finDateFrom}" onchange="finDateFrom=this.value;renderPage()" style="padding:6px 10px;border:1px solid var(--border);border-radius:6px;font-size:13px;font-family:inherit;cursor:pointer">
      <span style="font-size:13px;color:var(--text-muted)">até</span>
      <input type="date" value="${finDateTo}" onchange="finDateTo=this.value;renderPage()" style="padding:6px 10px;border:1px solid var(--border);border-radius:6px;font-size:13px;font-family:inherit;cursor:pointer">
      ${hasDateFilter ? '<button class="btn btn-secondary btn-sm" onclick="finDateFrom=\'\';finDateTo=\'\';renderPage()">Limpar período</button>' : ''}
    </div>
    <div class="tabs">
      <div class="tab ${finFilter==='todos'?'active':''}" onclick="finFilter='todos';renderPage()">Todos</div>
      <div class="tab ${finFilter==='receitas'?'active':''}" onclick="finFilter='receitas';renderPage()">Receitas</div>
      <div class="tab ${finFilter==='despesas'?'active':''}" onclick="finFilter='despesas';renderPage()">Despesas</div>
    </div>
    <div class="card">
      <table>
        <thead><tr><th>Data</th><th>Tipo</th><th>Categoria</th><th>Descrição</th><th>Valor</th><th></th></tr></thead>
        <tbody>${lanc.length ? lanc.map(l => `<tr><td>${fmtDate(l.data)}</td><td><span class="badge badge-${l.tipo==='receita'?'success':'danger'}">${l.tipo}</span></td><td>${escapeHtml(l.categoria||'-')}</td><td>${escapeHtml((l.descricao||'-').replace(/^\[ref:[^\]]+\]\s*/,''))}</td><td style="color:${l.tipo==='receita'?'var(--success)':'var(--danger)'};font-weight:600">${l.tipo==='despesa'?'-':''}${fmtBRL(l.valor)}</td><td><div style="display:flex;gap:4px"><button class="btn btn-secondary btn-sm" onclick="editarLancamento('${l.id}','${l.source}')">Editar</button> <button class="btn btn-secondary btn-sm" style="color:var(--danger)" onclick="excluirLancamento('${l.id}','${l.source}')">Excluir</button></div></td></tr>`).join('') : '<tr><td colspan="6" style="text-align:center;padding:20px;color:var(--text-muted)">Nenhum lançamento</td></tr>'}</tbody>
      </table>
    </div>`;
}

window.salvarLancamento = async function(e, tipo) {
  e.preventDefault();
  const f = e.target;
  const data = { tipo, data: f.data.value, valor: parseFloat(f.valor.value)||0, categoria: f.categoria.value, descricao: f.descricao.value };
  try {
    const u = (await sb.auth.getUser()).data.user;

};
window.excluirLancamento = async function(lid, source) {
  const realId = lid.replace(/^[av]_/, '');
  if (!confirm('Excluir este lançamento?')) return;
  try {
    if (source === 'agend') {
      const {error} = await sb.from('agendamentos').update({status:'confirmado'}).eq('id',realId);
      if (error) throw error;
      const idx = state.agendamentos.findIndex(x => x.id===realId);
      if (idx>=0) state.agendamentos[idx].status='confirmado';
    } else if (source === 'venda') {
      const {error} = await sb.from('vendas').delete().eq('id',realId);
      if (error) throw error;
      state.vendas = state.vendas.filter(v => v.id!==realId);
    } else {
      const {error} = await sb.from('financeiro').delete().eq('id',realId);
      if (error) throw error;
      state.financeiro = state.financeiro.filter(f => f.id!==realId);
    }
    renderPage();
  } catch(err) { reportErr('excluir lançamento',err); }
};

window.editarLancamento = function(lid, source) {
  const realId = lid.replace(/^[av]_/, '');
  if (source === 'fin') {
    const f = state.financeiro.find(x => x.id===realId); if (!f) return;
    openModal('<h3>Editar lançamento</h3><form onsubmit="salvarEdicaoFin(event,\''+realId+'\')"><div class="form-grid"><div class="form-group"><label>Data</label><input type="date" name="data" value="'+f.data+'" required></div><div class="form-group"><label>Valor (R$)</label><input type="number" step="0.01" name="valor" value="'+f.valor+'" required></div><div class="form-group full"><label>Categoria</label><input name="categoria" value="'+(f.categoria||'')+'" list="fincats2"><datalist id="fincats2"><option>Aluguel</option><option>Fornecedor</option><option>Salário</option><option>Energia</option><option>Outros</option></datalist></div><div class="form-group full"><label>Descrição</label><input name="descricao" value="'+escapeHtml(f.descricao||'')+'" required></div></div><div class="modal-actions"><button type="button" class="btn btn-secondary" onclick="closeModal()">Cancelar</button><button type="submit" class="btn btn-primary">Salvar</button></div></form>');

function pageRelatorios() {
  const gastoPorTutor = {};
  state.agendamentos.filter(a => a.status === 'realizado').forEach(a => { const p = getPet(a.petId); if (p) gastoPorTutor[p.tutorId] = (gastoPorTutor[p.tutorId]||0)+(a.valor||0); });
  state.vendas.forEach(v => { if (v.clienteId) gastoPorTutor[v.clienteId] = (gastoPorTutor[v.clienteId]||0)+(v.total||0); });
  const topClientes = Object.entries(gastoPorTutor).map(([id,v]) => ({tutor: getTutor(id), valor: v})).filter(x => x.tutor).sort((a,b) => b.valor-a.valor).slice(0,10);
  const hoje = todayStr();
  const inativos = state.tutores.map(t => { const pets = getPetsByTutor(t.id); const ultAgend = state.agendamentos.filter(a => pets.some(p => p.id === a.petId)).sort((a,b) => b.data.localeCompare(a.data))[0]; const dias = ultAgend ? daysBetween(ultAgend.data, hoje) : 999; return { tutor: t, dias, ultima: ultAgend?.data }; }).filter(x => x.dias >= 60).sort((a,b) => b.dias-a.dias).slice(0,15);
  const retornos = state.pets.map(p => ({pet: p, prox: proximoRetornoEstimado(p)})).filter(x => x.prox && x.prox <= hoje).sort((a,b) => a.prox.localeCompare(b.prox));
  const servCount = {};
  state.agendamentos.filter(a => a.status === 'realizado').forEach(a => servCount[a.servicoNome] = (servCount[a.servicoNome]||0)+1);
  const topServ = Object.entries(servCount).sort((a,b) => b[1]-a[1]).slice(0,6);
  const prodCount = {};
  state.vendas.forEach(v => v.itens.forEach(i => { if (i.tipo === 'produto') prodCount[i.nome] = (prodCount[i.nome]||0)+i.qtd; }));
  const topProd = Object.entries(prodCount).sort((a,b) => b[1]-a[1]).slice(0,6);

  setTimeout(() => {
    try {
      if (typeof Chart === 'undefined') return;
      const ctx1 = document.getElementById('chartTopClientes');
      if (ctx1 && topClientes.length) chartsRegistry.push(new Chart(ctx1, { type:'bar', data:{labels: topClientes.map(x => x.tutor.nome), datasets:[{label:'R$', data: topClientes.map(x => x.valor), backgroundColor:'#3b82f6', borderRadius:4}]}, options:{indexAxis:'y', responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}}}}));
      const ctx2 = document.getElementById('chartTopServ');
      if (ctx2 && topServ.length) chartsRegistry.push(new Chart(ctx2, { type:'pie', data:{labels: topServ.map(x => x[0]), datasets:[{data: topServ.map(x => x[1]), backgroundColor:['#3b82f6','#8b5cf6','#10b981','#f59e0b','#ef4444','#64748b']}]}, options:{responsive:true, maintainAspectRatio:false}}));
    } catch(e) { console.warn('Chart error:', e); }
  }, 100);

  return `
    <div class="page-header"><div><div class="page-title">Relatórios</div><div class="page-sub">Análises e rankings</div></div></div>
    <div class="grid-2">
      <div class="card"><h3>Top 10 clientes</h3><div class="chart-container"><canvas id="chartTopClientes"></canvas></div></div>
      <div class="card"><h3>Serviços mais populares</h3><div class="chart-container"><canvas id="chartTopServ"></canvas></div></div>
    </div>
    <div class="grid-2">
      <div class="card"><h3>Pets com retorno atrasado (${retornos.length})</h3>
        ${retornos.length ? `<table><thead><tr><th>Pet</th><th>Tutor</th><th>Telefone</th><th>Dias</th></tr></thead><tbody>${retornos.slice(0,15).map(r => { const t = getTutor(r.pet.tutorId); return `<tr><td>${escapeHtml(r.pet.nome)}</td><td>${escapeHtml(t?.nome||'')}</td><td>${escapeHtml(t?.telefone||'')}</td><td><span class="badge badge-warning">${daysBetween(r.prox, hoje)} dias</span></td></tr>`; }).join('')}</tbody></table>` : '<div class="empty-state">Nenhum pet atrasado.</div>'}
      </div>
      <div class="card"><h3>Clientes inativos (60+ dias)</h3>
        ${inativos.length ? `<table><thead><tr><th>Cliente</th><th>Telefone</th><th>Último serviço</th><th>Dias</th></tr></thead><tbody>${inativos.map(x => `<tr><td>${escapeHtml(x.tutor.nome)}</td><td>${escapeHtml(x.tutor.telefone||'')}</td><td>${x.ultima?fmtDate(x.ultima):'nunca'}</td><td><span class="badge badge-danger">${x.dias>900?'nunca':x.dias+'d'}</span></td></tr>`).join('')}</tbody></table>` : '<div class="empty-state">Todos os clientes estão ativos.</div>'}
      </div>
    </div>
    <div class="card"><h3>Top produtos vendidos</h3>
      ${topProd.length ? `<table><thead><tr><th>Produto</th><th>Qtd vendida</th></tr></thead><tbody>${topProd.map(p => `<tr><td>${escapeHtml(p[0])}</td><td><strong>${p[1]}</strong></td></tr>`).join('')}</tbody></table>` : '<div class="empty-state">Nenhuma venda de produto ainda.</div>'}
    </div>`;
}

    adminData.clientes = (data || []).map(p => ({
      id: p.id, nome: p.nome || '(sem nome)', empresa: p.empresa_nome || '',
      email: p.email || '', whatsapp: p.empresa_telefone || '',
      plano: p.plano_ativo ? (p.plano || 'Ativo') : (p.plano || 'Sem plano'),
      dataInicio: p.plano_data_inicio || null,
      dataExpiracao: p.plano_data_expiracao || null,
      stripeId: p.stripe_customer_id || '',
      ativo: p.plano_ativo || false,
      isAdmin: p.is_admin || false,

    }));

function saveAdminData() { /* no-op: dados ficam no Supabase */ }
let supportSession = null;
let adminTab = 'visao';

const PLANOS_VALORES = { 'Mensal': 197, 'Semestral': 147, 'Anual': 97, 'Trial': 0, 'Cancelado': 0 };

function statusCliente(c) {
  if (!c.ativo) return 'Inativo';
  const p = (c.plano || '').toLowerCase();
  if (p === 'cancelado') return 'Cancelado';
  if (c.dataExpiracao && c.dataExpiracao < todayStr()) return 'Vencido';
  if (p === 'trial') return 'Trial';
  return 'Ativo';
}
function corStatus(s) { return ({ Ativo: 'success', Trial: 'info', Cancelado: 'danger', Vencido: 'warning', Inativo: 'gray' }[s] || 'gray'); }

function pageAdmin() {
  if (!isAdmin()) { return '<div class="card empty-state">Acesso restrito ao administrador.</div>'; }
  const cs = adminData.clientes;
  const total = cs.length;
  const ativos = cs.filter(c => statusCliente(c) === 'Ativo').length;
  const trial = cs.filter(c => statusCliente(c) === 'Trial').length;
  const vencidos = cs.filter(c => statusCliente(c) === 'Vencido').length;
  const cancelados = cs.filter(c => statusCliente(c) === 'Cancelado' || statusCliente(c) === 'Inativo').length;
  let mrr = 0;
  cs.filter(c => statusCliente(c) === 'Ativo').forEach(c => { mrr += (PLANOS_VALORES[c.plano] || 0); });
  const arr = mrr * 12;
  const tempoMedio = (function() {
    const arr2 = cs.filter(c => c.dataInicio);
    if (!arr2.length) return 0;
    const dias = arr2.reduce((s,c) => s + Math.max(0, daysBetween(c.dataInicio, todayStr())), 0);
    return Math.round(dias / arr2.length);
  })();

  let conteudo = '';
  if (adminTab === 'visao') {
    const distrib = {};
    cs.forEach(c => { distrib[c.plano||'Sem plano'] = (distrib[c.plano||'Sem plano']||0)+1; });
    conteudo = `

        <div class="kpi"><div class="kpi-label">Tempo médio de assinatura</div><div class="kpi-value">${tempoMedio} dias</div></div>
      </div>
      <div class="card">
        <h3>Distribuição por plano</h3>
        ${total ? `<table><thead><tr><th>Plano</th><th>Clientes</th><th>Receita mensal</th></tr></thead><tbody>${Object.entries(distrib).map(([p,n]) => `<tr><td><strong>${escapeHtml(p)}</strong></td><td>${n}</td><td>${fmtBRL((PLANOS_VALORES[p]||0)*n)}</td></tr>`).join('')}</tbody></table>` : '<div class="empty-state">Nenhum cliente cadastrado ainda. Vá para a aba <strong>Clientes</strong> e adicione o primeiro.</div>'}

        ${total ? `<table>
          <thead><tr><th>Cliente</th><th>E-mail</th><th>WhatsApp</th><th>Plano</th><th>Início</th><th>Expira em</th><th>Status</th><th>Ações</th></tr></thead>

      </div>

  } else if (adminTab === 'naorenovados') {

                </td>

  } else if (adminTab === 'suporte') {
    conteudo = `
      <div class="card">
        <h3>Acessar conta do cliente para suporte técnico</h3>
        <div class="alert alert-info" style="margin-bottom:14px">
          <strong>Como funciona:</strong> Cada cliente tem seus dados isolados na conta Supabase dele.
          para entrar na conta dele você precisa do backup JSON. Peça para o cliente ir em <strong>Configurações → Backup dos dados → Exportar JSON</strong>
          e te enviar o arquivo. Aqui você importa e entra no modo suporte para visualizar exatamente o que ele vê.
        </div>
        ${total ? `<table>
          <thead><tr><th>Cliente</th><th>Plano</th><th>Status</th><th>Acessar conta</th></tr></thead>
          <tbody>
            ${cs.map(c => {
              const s = statusCliente(c);
              return `<tr>
                <td><strong>${escapeHtml(c.nome||'-')}</strong><br><small class=hint>${escapeHtml(c.email||'')}</small></td>

window.salvarClienteAdmin = async function(e, id) {
  e.preventDefault();
  const f = e.target;
  if (!id) { showAlert('No modelo SaaS, novos clientes se cadastram pela tela de Login. Para acompanhar um cliente existente, edite-o na lista.'); return; }
  try {
    const updates = {
      nome: f.nome.value,
      empresa_nome: f.empresa.value,
      empresa_telefone: f.whatsapp.value,
      plano: f.plano.value.toLowerCase(),
      plano_data_inicio: f.dataInicio.value || null,
      plano_data_expiracao: f.dataExpiracao.value || null,
      stripe_customer_id: f.stripeId.value || null,
      plano_ativo: !!f.ativo.checked
    };
    const { error } = await sb.from('profiles').update(updates).eq('id', id);
    if (error) throw error;
    await loadAdminClientes();
    closeModal(); renderPage();
  } catch(err) { reportErr('salvar cliente', err); }
};

window.confirmarEntradaSuporte = function(clienteId) {
  const file = document.getElementById('suporteFile')?.files?.[0];
  const txt = document.getElementById('suporteJsonText')?.value || '';
  const nomeRapido = document.getElementById('suporteNomeRapido')?.value || '';
  const cliente = clienteId ? adminData.clientes.find(c => c.id === clienteId) : null;
  const aplicar = (jsonStr) => {
    let data;
    try { data = JSON.parse(jsonStr); }
    catch(e) { alert('JSON inválido: ' + e.message); return; }
    if (!data || !data.empresa) { alert('JSON não parece um backup válido do CRM Spartus Pet (faltando .empresa)'); return; }
    supportSession = { clienteId: clienteId||null, clienteNome: cliente?.nome || nomeRapido || 'Cliente', clienteEmail: cliente?.email || '', originalState: state };
    state = data;
    if (!state.empresa.planoAtivo) state.empresa.planoAtivo = { id: 'suporte', nome: 'Suporte', data: todayStr() };
    currentPage = 'dashboard';
    closeModal();
    render();
  };
  if (file) {
    const r = new FileReader();
    r.onload = e => aplicar(e.target.result);
    r.readAsText(file);
  } else if (txt.trim()) {
    aplicar(txt);
  } else {
    alert('Selecione o arquivo JSON ou cole o conteúdo.');
  }
};

window.sairSuporte = function() {
  if (!supportSession) return;
  if (!confirm('Sair do modo suporte? Lembre-se: no modo suporte você está vendo o snapshot exportado do cliente.')) return;
  state = supportSession.originalState;
  supportSession = null;
  currentPage = 'admin';
  render();
};

window.exportarEstadoSuporte = function() {
  const blob = new Blob([JSON.stringify(state, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const nome = (supportSession?.clienteNome || 'cliente').replace(/\W+/g,'-').toLowerCase();
  a.href = url; a.download = `petshop-suporte-${nome}-${todayStr()}.json`;
  a.click();
  URL.revokeObjectURL(url);
};

window.salvarEmpresa = async function(e) {

    empresa_cnpj: f.cnpj.value, empresa_endereco: f.endereco.value,
    config_horario_abertura: f.horarioAbertura.value || '08:00',
    config_horario_fechamento: f.horarioFechamento.value || '18:00'
  };
  try {
    const u = (await sb.auth.getUser()).data.user;
    const { error } = await sb.from('profiles').update(updates).eq('id', u.id);
    if (error) throw error;
    state.empresa.nome = f.nome.value; state.empresa.telefone = f.telefone.value;
    state.empresa.cnpj = f.cnpj.value; state.empresa.endereco = f.endereco.value;
    state.config = { horarioAbertura: f.horarioAbertura.value, horarioFechamento: f.horarioFechamento.value };
    render(); showAlert('Dados salvos com sucesso!');
  } catch(err) { reportErr('salvar empresa', err); }

window.uploadLogo = async function(e) {
  const file = e.target.files[0]; if (!file) return;
  if (file.size > 2*1024*1024) { showAlert('Arquivo muito grande. Máximo 2MB.'); return; }
  try {
    const u = (await sb.auth.getUser()).data.user;
    const ext = (file.name.split('.').pop() || 'png').toLowerCase();
    const path = u.id + '/logo.' + ext;
    const { error: upErr } = await sb.storage.from('logos').upload(path, file, { upsert: true, contentType: file.type });
    if (upErr) throw upErr;
    const { data: pub } = sb.storage.from('logos').getPublicUrl(path);
    const url = pub.publicUrl + '?t=' + Date.now();
    const { error: dbErr } = await sb.from('profiles').update({ empresa_logo_url: url }).eq('id', u.id);
    if (dbErr) throw dbErr;
    state.empresa.logo = url;
    render();
  } catch(err) { reportErr('upload de logo', err); }
};
window.removerLogo = async function() {
  if (!confirm('Remover o logo da empresa?')) return;

    const { error } = await sb.from('profiles').update({ empresa_logo_url: null }).eq('id', u.id);

window.atualizarConta = async function(e) {
  e.preventDefault();
  const f = e.target;
  try {
    const u = (await sb.auth.getUser()).data.user;
    const updates = {};
    if (f.email.value && f.email.value.toLowerCase() !== auth.email) updates.email = f.email.value.toLowerCase();
    if (f.senha.value && f.senha.value.length >= 4) updates.password = f.senha.value;
    updates.data = { nome: f.nome.value };
    const { error: aErr } = await sb.auth.updateUser(updates);
    if (aErr) throw aErr;
    const { error: pErr } = await sb.from('profiles').update({ nome: f.nome.value }).eq('id', u.id);
    if (pErr) throw pErr;
    auth.nome = f.nome.value;
    if (updates.email) auth.email = updates.email;
    session.nome = auth.nome; session.email = auth.email;
    render(); showAlert('Conta atualizada!');
  } catch(err) { reportErr('atualizar conta', err); }
};

window.importarDados = e => {
  const file = e.target.files[0]; if (!file) return;

  r.readAsText(file);
};
window.limparTudo = () => {
  if (!confirm('Apagar TODOS os dados? Esta ação não pode ser desfeita.')) return;
  if (!confirm('Última confirmação: apagar tudo?')) return;
  state = { empresa:{nome:'',telefone:'',endereco:'',cnpj:'',logo:''}, tutores:[], pets:[], servicos:[], agendamentos:[], produtos:[], vendas:[], financeiro:[], config:{horarioAbertura:'08:00',horarioFechamento:'18:00'} };
  saveState(); render();
};

// ====== INIT ======
window.addEventListener('error', function(e) {
  const root = document.getElementById('root');
  if (root && !root.innerHTML) {
    root.innerHTML = '<div style="padding:40px;font-family:system-ui;max-width:600px;margin:40px auto;background:#fee2e2;border-radius:8px;color:#991b1b"><h2 style="margin-bottom:10px">Erro ao iniciar</h2><p style="margin-bottom:8px">Mensagem: ' + (e.message || 'desconhecido') + '</p><p style="font-size:12px">Arquivo: ' + (e.filename||'') + ' linha ' + (e.lineno||'?') + '</p></div>';
  }
});

async function startApp() {
  try {
    // Tela de loading
    document.getElementById('root').innerHTML = `
      <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg, #fafaf9 0%, #f0ebe0 100%)">
        <div style="text-align:center;font-family:Inter,sans-serif">
          <div style="margin:0 auto 20px;width:120px;height:120px">${spartusLogoSVG(120)}</div>
          <div style="font-family:'Playfair Display',serif;font-size:24px;font-weight:800;letter-spacing:-0.5px;margin-bottom:8px">Spartus Pet</div>
          <div style="color:#6b7280;font-size:13px">Carregando seu sistema...</div>
        </div>
      </div>`;

    // Verifica sessão ativa
    const { data: { session: sbSession } } = await sb.auth.getSession();
    if (sbSession && sbSession.user) {
      await loadAllFromSupabase();
      startAutoComplete();
      if (isAdmin()) currentPage = 'admin';
    }
    render();

    // Listener para mudanças de auth (logout em outra aba etc.)
    sb.auth.onAuthStateChange(async (event, sbSession) => {
      if (event === 'SIGNED_OUT') {
        auth = null; session = null; state = emptyState();
        loginMode = 'login';
        renderLogin();
      } else if (event === 'SIGNED_IN' && sbSession && (!auth || auth.email !== sbSession.user.email)) {
        await loadAllFromSupabase();
        if (isAdmin()) currentPage = 'admin';
        render();
      }
    });
  } catch(err) {
    console.error('startApp error:', err);
    document.getElementById('root').innerHTML = '<div style="padding:40px;font-family:system-ui;max-width:600px;margin:40px auto;background:#fee2e2;border-radius:8px;color:#991b1b"><h2>Erro ao iniciar o CRM</h2><p>' + (err.message || String(err)) + '</p><pre style="margin-top:10px;font-size:11px;white-space:pre-wrap">' + (err.stack||'') + '</pre></div>';
  }
}
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', startApp);
} else {
  startApp();
}
</script>
